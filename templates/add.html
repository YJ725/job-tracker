{% extends "base.html" %}
{% block content %}

<div class="form-card">
  <h2>공고 추가</h2>
  <form method="post">
    <div class="form-group">
      <label for="title">공고 제목 *</label>
      <input type="text" id="title" name="title" required placeholder="예: 백엔드 개발자 채용">
    </div>
    <div class="form-group">
      <label for="company">회사명 *</label>
      <input type="text" id="company" name="company" required placeholder="예: 카카오">
    </div>
    <div class="form-group">
      <label for="url">공고 링크</label>
      <input type="url" id="url" name="url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label for="description">공고 내용 요약</label>
      <textarea id="description" name="description" rows="4" placeholder="주요 자격요건, 우대사항 등"></textarea>
    </div>
    <div class="form-group">
      <label for="memo">메모</label>
      <textarea id="memo" name="memo" rows="3" placeholder="내 생각, 준비할 것 등"></textarea>
    </div>
    <button type="submit" class="btn">추가</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-left:8px;">취소</a>
  </form>
</div>

{% endblock %}
